# MDC licence ↔ feature matrix
# Used by the agent to translate "what licences do you have?" into "what features can you use today vs what would you need to buy?"
# Pricing is per-resource / per-resource-hour; see https://azure.microsoft.com/pricing/details/defender-for-cloud/ for live numbers.
# Last reviewed: 2026-05.

product: mdc
billing_model: per_resource   # NOT per-user. Tenant-level M365 SKUs do NOT entitle you to MDC plans.

# -----------------------------------------------------------------------------
# Tier 1 — included with every Azure subscription, no SKU required.
# -----------------------------------------------------------------------------
free_tier:
  name: Foundational CSPM
  enabled_by_default: true
  features:
    - Secure Score
    - Asset inventory
    - Security recommendations (Microsoft Cloud Security Benchmark)
    - Regulatory compliance dashboard (MCSB)
    - Basic alerts ingestion
  detect_with: az security pricing show -n CloudPosture --subscription {{subId}}
  source: https://learn.microsoft.com/azure/defender-for-cloud/concept-cloud-security-posture-management

# -----------------------------------------------------------------------------
# Tier 2 — Defender CSPM (paid)
# -----------------------------------------------------------------------------
defender_cspm:
  sku_name: Defender CSPM
  pricing_unit: per billable resource / month
  trial_days: 30
  features:
    - Attack path analysis
    - Cloud security graph + KQL hunting
    - Agentless VM vulnerability assessment (powered by MDVM)
    - Agentless container vulnerability assessment
    - Agentless secret scanning across VMs and containers
    - Data-aware security posture (Storage, multi-cloud)
    - Permissions Management (CIEM) integration
    - Governance rules + ServiceNow ITSM
    - Code-to-cloud mapping (with DevOps connector)
  enable_cmd: az security pricing create -n CloudPosture --tier Standard --subscription {{subId}}
  source: https://learn.microsoft.com/azure/defender-for-cloud/concept-cloud-security-posture-management

# -----------------------------------------------------------------------------
# Tier 3 — Defender workload plans (paid, independent toggles)
# -----------------------------------------------------------------------------
workload_plans:
  - plan_id: VirtualMachines
    display: Defender for Servers
    sub_plans:
      - id: P1
        features: [MDE for Servers integration, anti-malware, EDR, basic FIM]
      - id: P2
        features: [P1 features, MDVM premium, Just-in-Time VM access, FIM, regulatory baselines, 500 MB/day free LA ingest, agentless disk scanning]
    pricing_unit: per server / month
    trial_days: 30
    enable_cmd: az security pricing create -n VirtualMachines --tier Standard --subplan P2 --subscription {{subId}}

  - plan_id: SqlServers
    display: Defender for SQL (Azure SQL DB / MI)
    pricing_unit: per server / month

  - plan_id: SqlServerVirtualMachines
    display: Defender for SQL on machines
    pricing_unit: per server / month

  - plan_id: StorageAccounts
    display: Defender for Storage
    sub_plans:
      - id: DefenderForStorageV2
        features: [activity monitoring, Malware Scanning (opt-in, per-GB), Sensitive Data Discovery]
    pricing_unit: per storage account / month + per-GB scan
    trial_days: 30

  - plan_id: AppServices
    display: Defender for App Service
    pricing_unit: per App Service plan vCore / hour

  - plan_id: KeyVaults
    display: Defender for Key Vault
    pricing_unit: per 10K transactions

  - plan_id: Arm
    display: Defender for Resource Manager
    pricing_unit: per 1M ARM operations

  - plan_id: Containers
    display: Defender for Containers
    features: [runtime threat detection, image scan, K8s posture, agentless K8s discovery]
    pricing_unit: per vCore / hour
    trial_days: 30

  - plan_id: Api
    display: Defender for APIs
    pricing_unit: per 100 API calls

  - plan_id: CosmosDbs
    display: Defender for Cosmos DB
    pricing_unit: per 100 RU/s

  - plan_id: AiServices
    display: Defender for AI Services
    pricing_unit: per 1K AI transactions

# -----------------------------------------------------------------------------
# Multi-cloud — adds per-resource pricing on top of the connector
# -----------------------------------------------------------------------------
multi_cloud:
  aws:
    plans_supported: [Defender CSPM, Defender for Servers, Defender for Containers, Defender for SQL on EC2]
    setup: CloudFormation template auto-generated by MDC
  gcp:
    plans_supported: [Defender CSPM, Defender for Servers, Defender for Containers, Defender for SQL on GCE]
    setup: Terraform / gcloud script auto-generated by MDC
  hybrid:
    plans_supported: [Defender for Servers (P1/P2)]
    setup: Azure Arc onboarding (per-server script or at-scale ScriptedAction/policy)

# -----------------------------------------------------------------------------
# DevOps connectors
# -----------------------------------------------------------------------------
devops:
  github:
    requires: GitHub Advanced Security NOT required for posture; required for full secret scanning push protection.
  azure_devops:
    requires: OAuth app install; org admin to authorise.
  features: [IaC scan, secret scan, container image scan in CI, code-to-cloud mapping (with Defender CSPM)]

# -----------------------------------------------------------------------------
# Things customers commonly THINK entitle them to MDC but do NOT
# -----------------------------------------------------------------------------
common_misconceptions:
  - claim: "We have M365 E5, so we have MDC."
    truth: "False. M365 E5 includes MDE / Defender for Office / Defender for Identity / Purview etc — but NOT MDC. MDC is per-Azure-resource."
  - claim: "We have EMS E5."
    truth: "Includes Intune + Entra ID P2 + AIP — does not include MDC."
  - claim: "We pay for Sentinel."
    truth: "Sentinel is per-GB ingestion — independent of MDC plans."
  - claim: "Free CSPM gives us attack paths."
    truth: "Attack paths require Defender CSPM (paid)."
